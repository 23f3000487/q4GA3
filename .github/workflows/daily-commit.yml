name: Daily Commit

on:
  schedule:
    - cron: '30 12 * * *'  # daily at 12:30 UTC
  workflow_dispatch:

jobs:
  daily-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Track daily activity for 23f3000487@ds.study.iitm.ac.in
        run: |
          echo "Daily automated activity logged at $(date)" >> last_run.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_run.txt
          git commit -m "Daily commit from GitHub Action" || echo "No changes to commit"
          git push

